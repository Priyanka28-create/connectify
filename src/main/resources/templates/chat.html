<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connectify</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --text: white;
            --text-muted: #888;
            --bubble-other: rgba(255,255,255,0.08);
            --input-bg: rgba(255,255,255,0.07);
        }
        .light-mode {
            --bg: linear-gradient(135deg, #e8eaf6, #e3f2fd, #f3e5f5);
            --card: rgba(255,255,255,0.8);
            --border: rgba(0,0,0,0.1);
            --text: #1a1a2e;
            --text-muted: #666;
            --bubble-other: rgba(0,0,0,0.06);
            --input-bg: rgba(0,0,0,0.05);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            transition: all 0.3s;
        }
        .navbar {
            padding: 14px 24px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            padding: 8px 14px;
            background: var(--input-bg);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .navbar h2 { font-size: 1.1rem; color: var(--text); }
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            gap: 8px;
            max-width: 300px;
            margin-left: auto;
        }
        .search-box input {
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            width: 100%;
        }
        .online-count {
            font-size: 0.8rem;
            color: #4ade80;
            background: rgba(74,222,128,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(74,222,128,0.2);
            white-space: nowrap;
        }
        .theme-btn {
            padding: 8px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
        }
        .logout {
            padding: 8px 14px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #ef4444;
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 57px);
        }
        .sidebar {
            width: 220px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            overflow-y: auto;
        }
        .sidebar h4 {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-item:hover { background: rgba(124,58,237,0.2); }
        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .user-name { color: var(--text-muted); font-size: 0.88rem; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
        .dm-hint { font-size: 0.7rem; color: #555; margin-bottom: 10px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message { display: flex; gap: 12px; max-width: 75%; position: relative; }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message.other { align-self: flex-start; }
        .message.hidden { display: none; }
        .msg-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .msg-content { display: flex; flex-direction: column; gap: 4px; }
        .message.own .msg-content { align-items: flex-end; }
        .msg-sender { font-size: 0.75rem; color: var(--text-muted); }
        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.93rem;
            line-height: 1.5;
            color: var(--text);
            position: relative;
            cursor: pointer;
        }
        .message.own .bubble {
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other .bubble {
            background: var(--bubble-other);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-time { font-size: 0.7rem; color: var(--text-muted); }
        .reactions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .reaction-badge {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .reaction-menu {
            display: none;
            position: absolute;
            background: #1a1a2e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            gap: 4px;
            flex-wrap: wrap;
            width: 200px;
            z-index: 100;
            bottom: 110%;
            left: 0;
        }
        .reaction-menu.show { display: flex; }
        .reaction-opt { font-size: 1.3rem; cursor: pointer; padding: 4px; border-radius: 6px; }
        .reaction-opt:hover { background: rgba(124,58,237,0.3); }
        .img-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            object-fit: cover;
        }
        .file-bubble {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 18px;
            background: var(--bubble-other);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }
        .system-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 4px 12px;
            background: var(--input-bg);
            border-radius: 20px;
            align-self: center;
        }
        .typing-indicator {
            padding: 0 24px 8px;
            color: var(--text-muted);
            font-size: 0.8rem;
            min-height: 24px;
            font-style: italic;
        }
        .private-modal {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: #1a1a2e;
            border: 1px solid rgba(124,58,237,0.4);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 1000;
            flex-direction: column;
            overflow: hidden;
        }
        .private-modal.show { display: flex; }
        .private-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .private-header h4 { font-size: 0.95rem; }
        .close-dm { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .private-messages {
            height: 250px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dm-msg {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.88rem;
            max-width: 85%;
        }
        .dm-msg.own {
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .dm-msg.other {
            background: rgba(255,255,255,0.08);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .dm-sender { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
        .private-input {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }
        .private-input input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 0.88rem;
            outline: none;
        }
        .private-input button {
            padding: 10px 14px;
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 0.88rem;
        }
        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 24px;
            background: #1a1a2e;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            width: 300px;
            flex-wrap: wrap;
            gap: 4px;
            z-index: 100;
        }
        .emoji-picker.show { display: flex; }
        .emoji-opt { font-size: 1.4rem; cursor: pointer; padding: 4px; border-radius: 6px; }
        .emoji-opt:hover { background: rgba(124,58,237,0.3); }
        .emoji-btn, .file-btn {
            padding: 10px 13px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text);
        }
        .chat-input-area input[type="text"] {
            flex: 1;
            padding: 13px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }
        .chat-input-area input[type="text"]:focus { border-color: #7c3aed; }
        .send-btn {
            padding: 13px 22px;
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        ::placeholder { color: rgba(255,255,255,0.2); }
        .highlight { background: rgba(255,220,0,0.3) !important; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="back-btn">← Back</a>
        <h2>💬 <span th:text="${room.name}"></span></h2>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search messages..." oninput="searchMessages()"/>
        </div>
        <span class="online-count">● Online</span>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <a href="/logout" class="logout">Logout</a>
    </nav>

    <div class="main">
        <div class="sidebar">
            <h4>Online Users</h4>
            <p class="dm-hint">Click user to DM 💬</p>
            <div id="usersList">
                <div th:each="user : ${onlineUsers}"
                     th:if="${user.username != currentUser.username}"
                     class="user-item"
                     th:data-username="${user.username}"
                     th:data-displayname="${user.displayName}"
                     onclick="openDMFromData(this)">
                    <div class="avatar"
                         th:style="'background:' + ${user.avatarColor}"
                         th:text="${#strings.substring(user.displayName, 0, 1)}"></div>
                    <span class="user-name" th:text="${user.displayName}"></span>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div th:each="msg : ${messages}"
                     th:classappend="${msg.sender.username == currentUser.username} ? 'own' : 'other'"
                     class="message">
                    <div class="msg-avatar"
                         th:style="'background:' + ${msg.sender.avatarColor}"
                         th:text="${#strings.substring(msg.sender.displayName, 0, 1)}"></div>
                    <div class="msg-content">
                        <span class="msg-sender" th:text="${msg.sender.displayName}"></span>
                        <div class="bubble" th:text="${msg.content}"></div>
                        <span class="msg-time" th:text="${#temporals.format(msg.createdAt, 'hh:mm a')}"></span>
                        <div class="reactions"></div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator"></div>

            <div class="chat-input-area">
                <div class="emoji-picker" id="emojiPicker">
                    <span class="emoji-opt" onclick="addEmoji('😀')">😀</span>
                    <span class="emoji-opt" onclick="addEmoji('😂')">😂</span>
                    <span class="emoji-opt" onclick="addEmoji('😍')">😍</span>
                    <span class="emoji-opt" onclick="addEmoji('🥰')">🥰</span>
                    <span class="emoji-opt" onclick="addEmoji('😎')">😎</span>
                    <span class="emoji-opt" onclick="addEmoji('😭')">😭</span>
                    <span class="emoji-opt" onclick="addEmoji('😤')">😤</span>
                    <span class="emoji-opt" onclick="addEmoji('🤔')">🤔</span>
                    <span class="emoji-opt" onclick="addEmoji('👍')">👍</span>
                    <span class="emoji-opt" onclick="addEmoji('👎')">👎</span>
                    <span class="emoji-opt" onclick="addEmoji('❤️')">❤️</span>
                    <span class="emoji-opt" onclick="addEmoji('🔥')">🔥</span>
                    <span class="emoji-opt" onclick="addEmoji('🎉')">🎉</span>
                    <span class="emoji-opt" onclick="addEmoji('💯')">💯</span>
                    <span class="emoji-opt" onclick="addEmoji('🙏')">🙏</span>
                    <span class="emoji-opt" onclick="addEmoji('😊')">😊</span>
                    <span class="emoji-opt" onclick="addEmoji('🤣')">🤣</span>
                    <span class="emoji-opt" onclick="addEmoji('😅')">😅</span>
                    <span class="emoji-opt" onclick="addEmoji('🥳')">🥳</span>
                    <span class="emoji-opt" onclick="addEmoji('💪')">💪</span>
                    <span class="emoji-opt" onclick="addEmoji('✨')">✨</span>
                    <span class="emoji-opt" onclick="addEmoji('🫶')">🫶</span>
                    <span class="emoji-opt" onclick="addEmoji('😴')">😴</span>
                    <span class="emoji-opt" onclick="addEmoji('🤯')">🤯</span>
                    <span class="emoji-opt" onclick="addEmoji('😱')">😱</span>
                    <span class="emoji-opt" onclick="addEmoji('🤩')">🤩</span>
                    <span class="emoji-opt" onclick="addEmoji('😏')">😏</span>
                    <span class="emoji-opt" onclick="addEmoji('💀')">💀</span>
                    <span class="emoji-opt" onclick="addEmoji('👀')">👀</span>
                    <span class="emoji-opt" onclick="addEmoji('🤝')">🤝</span>
                </div>
                <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
                <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)"/>
                <input type="text" id="messageInput" placeholder="Type a message..."/>
                <button class="send-btn" onclick="sendMessage()">Send ➤</button>
            </div>
        </div>
    </div>

    <div class="private-modal" id="privateModal">
        <div class="private-header">
            <h4>💬 DM: <span id="dmRecipientName"></span></h4>
            <button class="close-dm" onclick="closeDM()">✕</button>
        </div>
        <div class="private-messages" id="privateMessages"></div>
        <div class="private-input">
            <input type="text" id="dmInput" placeholder="Type a message..."/>
            <button onclick="sendDM()">Send</button>
        </div>
    </div>

    <script th:inline="javascript">
        const roomName = [[${room.name}]];
        const currentUser = [[${currentUser.displayName}]];
        const currentUsername = [[${currentUser.username}]];
        let stompClient = null;
        let typingTimer = null;
        let isDark = true;
        let dmRecipient = null;

        function openDMFromData(el) {
            const username = el.getAttribute('data-username');
            const displayName = el.getAttribute('data-displayname');
            openDM(displayName, username);
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
        }

        function toggleEmoji() {
            document.getElementById('emojiPicker').classList.toggle('show');
        }

        function addEmoji(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.getElementById('messageInput').focus();
            document.getElementById('emojiPicker').classList.remove('show');
        }

        function openDM(displayName, username) {
            if (username === currentUsername) return;
            dmRecipient = username;
            document.getElementById('dmRecipientName').textContent = displayName;
            document.getElementById('privateModal').classList.add('show');
            document.getElementById('dmInput').focus();
        }

        function closeDM() {
            document.getElementById('privateModal').classList.remove('show');
            dmRecipient = null;
        }

        function sendDM() {
            const input = document.getElementById('dmInput');
            const content = input.value.trim();
            if (content && stompClient && dmRecipient) {
                stompClient.send("/app/chat.private", {},
                    JSON.stringify({
                        sender: currentUser,
                        receiver: dmRecipient,
                        content: content,
                        type: 'PRIVATE'
                    }));
                input.value = '';
            }
        }

        function onPrivateMessage(payload) {
            const message = JSON.parse(payload.body);
            const messagesDiv = document.getElementById('privateMessages');
            const isOwn = message.sender === currentUser;
            if (!document.getElementById('privateModal').classList.contains('show')) {
                document.getElementById('privateModal').classList.add('show');
                document.getElementById('dmRecipientName').textContent = message.sender;
            }
            const div = document.createElement('div');
            div.className = 'dm-msg ' + (isOwn ? 'own' : 'other');
            div.innerHTML = '<div class="dm-sender">' + message.sender + '</div>' + message.content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (stompClient) {
                const isImage = file.type.startsWith('image/');
                stompClient.send("/app/chat.sendMessage", {},
                    JSON.stringify({
                        sender: currentUser,
                        content: isImage ? '📷 ' + file.name : '📎 ' + file.name,
                        fileUrl: data.url,
                        fileType: file.type,
                        room: roomName,
                        type: 'CHAT'
                    }));
            }
            input.value = '';
        }

        function searchMessages() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.message').forEach(msg => {
                const bubble = msg.querySelector('.bubble');
                if (!bubble) return;
                const text = bubble.textContent.toLowerCase();
                if (query === '') {
                    msg.classList.remove('hidden');
                    bubble.classList.remove('highlight');
                } else if (text.includes(query)) {
                    msg.classList.remove('hidden');
                    bubble.classList.add('highlight');
                } else {
                    msg.classList.add('hidden');
                }
            });
        }

        const reactionEmojis = ['👍', '❤️', '😂', '😮', '😢', '🔥'];

        function showReactionMenu(msgDiv) {
            document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
            let menu = msgDiv.querySelector('.reaction-menu');
            if (!menu) {
                menu = document.createElement('div');
                menu.className = 'reaction-menu';
                reactionEmojis.forEach(r => {
                    const span = document.createElement('span');
                    span.className = 'reaction-opt';
                    span.textContent = r;
                    span.onclick = (e) => { e.stopPropagation(); addReaction(msgDiv, r); };
                    menu.appendChild(span);
                });
                msgDiv.querySelector('.msg-content').appendChild(menu);
            }
            menu.classList.toggle('show');
        }

        function addReaction(msgDiv, emoji) {
            const reactionsDiv = msgDiv.querySelector('.reactions');
            const existing = reactionsDiv.querySelector('[data-emoji="' + emoji + '"]');
            if (existing) {
                const count = parseInt(existing.dataset.count) + 1;
                existing.dataset.count = count;
                existing.textContent = emoji + ' ' + count;
            } else {
                const badge = document.createElement('span');
                badge.className = 'reaction-badge';
                badge.dataset.emoji = emoji;
                badge.dataset.count = 1;
                badge.textContent = emoji + ' 1';
                reactionsDiv.appendChild(badge);
            }
            msgDiv.querySelector('.reaction-menu').classList.remove('show');
        }

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function() {
                stompClient.subscribe('/topic/' + roomName, onMessageReceived);
                stompClient.subscribe('/topic/' + roomName + '.typing', onTyping);
                stompClient.subscribe('/user/queue/private', onPrivateMessage);
                stompClient.send("/app/chat.addUser", {},
                    JSON.stringify({sender: currentUser, room: roomName, type: 'JOIN'}));
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (content && stompClient) {
                stompClient.send("/app/chat.sendMessage", {},
                    JSON.stringify({sender: currentUser, content: content, room: roomName, type: 'CHAT'}));
                input.value = '';
            }
        }

        function appendMessage(message, isOwn) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ' + (isOwn ? 'own' : 'other');
            const initial = message.sender.charAt(0).toUpperCase();
            const avatarColor = message.avatarColor || '#7c3aed';
            let contentHtml = '';
            if (message.fileUrl) {
                const isImage = message.fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i);
                if (isImage) {
                    contentHtml = '<img src="' + message.fileUrl + '" class="img-preview" onclick="window.open(this.src)"/>';
                } else {
                    contentHtml = '<a href="' + message.fileUrl + '" class="file-bubble" download>📎 ' + message.content.replace('📎 ', '') + '</a>';
                }
            } else {
                contentHtml = '<div class="bubble" ondblclick="showReactionMenu(this.closest(\'.message\'))">' + message.content + '</div>';
            }
            div.innerHTML =
                '<div class="msg-avatar" style="background:' + avatarColor + '">' + initial + '</div>' +
                '<div class="msg-content">' +
                '<span class="msg-sender">' + message.sender + '</span>' +
                contentHtml +
                '<span class="msg-time">' + (message.timestamp || '') + '</span>' +
                '<div class="reactions"></div>' +
                '</div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function onMessageReceived(payload) {
            const message = JSON.parse(payload.body);
            if (message.type === 'JOIN' || message.type === 'LEAVE') {
                const div = document.createElement('div');
                div.className = 'system-msg';
                div.textContent = message.type === 'JOIN'
                    ? message.sender + ' joined the room 👋'
                    : message.sender + ' left the room';
                document.getElementById('messages').appendChild(div);
            } else {
                appendMessage(message, message.sender === currentUser);
            }
        }

        function onTyping(payload) {
            const message = JSON.parse(payload.body);
            const indicator = document.getElementById('typingIndicator');
            if (message.sender !== currentUser) {
                indicator.textContent = message.type === 'TYPING'
                    ? message.sender + ' is typing...' : '';
            }
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            } else if (stompClient) {
                stompClient.send("/app/chat.typing", {},
                    JSON.stringify({sender: currentUser, room: roomName, type: 'TYPING'}));
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    stompClient.send("/app/chat.typing", {},
                        JSON.stringify({sender: currentUser, room: roomName, type: 'STOP_TYPING'}));
                }, 2000);
            }
        });

        document.getElementById('dmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendDM();
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.emoji-btn') && !e.target.closest('.emoji-picker')) {
                document.getElementById('emojiPicker').classList.remove('show');
            }
            if (!e.target.closest('.bubble') && !e.target.closest('.reaction-menu')) {
                document.querySelectorAll('.reaction-menu.show').forEach(m => m.classList.remove('show'));
            }
        });

        window.onload = function() {
            connect();
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        };
    </script>
</body>
</html>

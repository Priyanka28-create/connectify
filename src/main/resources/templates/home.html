<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connectify - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            padding: 16px 32px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 1.5rem; }
        .navbar span { color: #888; font-size: 0.9rem; }
        .logout {
            padding: 8px 16px;
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: #ef4444;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h2 { font-size: 1.8rem; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 32px; }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        .room-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            cursor: pointer;
        }
        .room-card:hover {
            background: rgba(124,58,237,0.2);
            border-color: #7c3aed;
            transform: translateY(-2px);
        }
        .room-icon { font-size: 2rem; margin-bottom: 12px; }
        .room-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
        .room-desc { color: #888; font-size: 0.85rem; }
        .create-room {
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 32px;
            margin-top: 20px;
        }
        .create-room h3 { margin-bottom: 16px; color: #aaa; }
        .input-row { display: flex; gap: 12px; margin-bottom: 12px; }
        input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus { border-color: #7c3aed; }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        ::placeholder { color: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>💬 Connectify</h1>
        <span>Welcome, <strong th:text="${username}"></strong></span>
        <a href="/logout" class="logout">Logout</a>
    </nav>

    <div class="container">
        <h2>Chat Rooms</h2>
        <p class="subtitle">Pick a room and start chatting!</p>

        <div class="rooms-grid">
            <a th:each="room : ${rooms}"
               th:href="@{/chat/{name}(name=${room.name})}"
               class="room-card">
                <div class="room-icon">💬</div>
                <div class="room-name" th:text="${room.name}"></div>
                <div class="room-desc" th:text="${room.description}"></div>
            </a>
        </div>

        <div class="create-room">
            <h3>➕ Create New Room</h3>
            <form action="/room/create" method="post">
                <div class="input-row">
                    <input type="text" name="name" placeholder="Room name" required/>
                    <input type="text" name="description" placeholder="Description"/>
                    <button type="submit" class="btn">Create</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

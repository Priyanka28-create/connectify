<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connectify - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
        }
        .logo { font-size: 2.5rem; margin-bottom: 8px; }
        h1 { color: white; font-size: 1.8rem; margin-bottom: 4px; }
        .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #7c3aed; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #3478f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .link { color: #7c3aed; text-decoration: none; }
        .footer { color: #666; font-size: 0.85rem; margin-top: 20px; }
        .error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .success {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #10b981;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        ::placeholder { color: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">💬</div>
        <h1>Connectify</h1>
        <p class="subtitle">Connect with anyone, instantly</p>

        <div th:if="${param.error}" class="error">
            Invalid username or password!
        </div>
        <div th:if="${param.registered}" class="success">
            Registered successfully! Please login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn">Login →</button>
        </form>

        <p class="footer">Don't have an account? 
            <a href="/register" class="link">Register</a>
        </p>
    </div>
</body>
</html>
